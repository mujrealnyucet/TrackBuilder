<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <div class="container">
        <div class="grid"></div>
        <form class="track-select" name="trackSelect">
            <input type="radio" name="track-radio" id="trava">
            <label for="trava" class="trava">
                <img src="./assets/trava.png" alt="" class="track-preview" draggable="false">
            </label>
            <input type="radio" name="track-radio" id="louka">
            <label for="louka" class="louka">
                <img src="./assets/louka.png" alt="" class="track-preview" draggable="false">
            </label>
            <input type="radio" name="track-radio" id="silnice-straight">
            <label for="silnice-straight" class="silnice-straight">
                <img src="./assets/silnice-straight.png" alt="" class="track-preview" draggable="false">
            </label>
            <input type="radio" name="track-radio" id="silnice-turn">
            <label for="silnice-turn" class="silnice-turn">
                <img src="./assets/silnice-turn.png" alt="" class="track-preview" draggable="false">
            </label>
            <input type="radio" name="track-radio" id="silnice-triple">
            <label for="silnice-triple" class="silnice-triple">
                <img src="./assets/silnice-triple.png" alt="" class="track-preview" draggable="false">
            </label>
            <input type="radio" name="track-radio" id="silnice-crossroad">
            <label for="silnice-crossroad" class="silnice-crossroad">
                <img src="./assets/silnice-crossroad.png" alt="" class="track-preview" draggable="false">
            </label>
            <button type="submit" style="display: none;"></button>
        </form>
        <div class="save-menu">
            <button type="button" class="save-as-btn">Save as</button>
        </div>
    </div>
</body>
</html>
<script src="main.js"></script>
